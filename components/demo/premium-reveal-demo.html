<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CelebrateBanner · Premium Reveal Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #0C0E14; color: #FAF8F3; font-family: 'Outfit', system-ui, sans-serif; }
    .demo-bar {
      position: sticky; top: 0; z-index: 500; display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
      padding: 12px 18px; background: rgba(12,14,20,0.92); backdrop-filter: blur(6px);
      border-bottom: 1px solid rgba(201,168,76,0.25);
    }
    .demo-bar .brand { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 20px; margin-right: auto; }
    .demo-bar .brand em { color: #C9A84C; font-style: normal; }
    .demo-bar label { font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: rgba(250,248,243,0.5); }
    .demo-bar select, .demo-bar button {
      font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600; padding: 8px 14px; border-radius: 999px;
      background: transparent; color: #FAF8F3; border: 1px solid rgba(201,168,76,0.35); cursor: pointer;
    }
    .demo-bar select { background: #141824; }
    .demo-bar button:hover, .demo-bar select:hover { border-color: #C9A84C; }
    .demo-note { max-width: 1200px; margin: 14px auto 0; padding: 0 18px; color: rgba(250,248,243,0.45); font-size: 12px; text-align: center; }
    #demo-toast {
      position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(20px);
      background: linear-gradient(135deg,#C9A84C,#E8C97A); color: #0C0E14; font-weight: 700; font-size: 13px;
      padding: 10px 18px; border-radius: 999px; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      opacity: 0; pointer-events: none; transition: all .25s ease; z-index: 600;
    }
    #demo-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="demo-bar">
    <span class="brand">Celebrate<em>Banner</em> · Premium Reveal</span>
    <label for="fixture">Fixture</label>
    <select id="fixture" aria-label="Choose a celebration fixture">
      <option value="graduation">Graduation</option>
      <option value="championship">Championship</option>
      <option value="family">Family Reunion</option>
      <option value="wedding">Wedding</option>
      <option value="memorial">Memorial</option>
    </select>
    <button id="replay" type="button">↻ Replay Loading</button>
    <button id="skip" type="button">⏭ Skip to Reveal</button>
  </div>

  <div id="reveal"></div>

  <p class="demo-note">
    Demo only — renders <code>WOWPresentation</code> fixtures through the Premium Reveal UI.
    No backend, no renderer, no checkout, no pricing. Preview tiles are placeholders.
  </p>

  <!-- Self-contained bundle: components + fixtures inlined. Classic script → works on file:// too. -->
  <script src="./premium-reveal-demo.js"></script>
</body>
</html>
